<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 480" role="img" aria-label="Oil Viscosity versus Temperature Graph showing inverse relationship">
  <desc>Dual-axis graph showing how kinematic viscosity and density of oil both decrease with increasing temperature. Viscosity drops steeply from about 850 mm²/s at 0°C to near zero above 60°C. Density declines gently and linearly from 0.880 to 0.790 g/cm³ over the same range.</desc>

  <!-- Background -->
  <rect x="0" y="0" width="780" height="480" fill="#F5F5F0" rx="8" ry="8" stroke="#D1D5DB" stroke-width="1"/>

  <!-- Title (top-left) -->
  <text x="80" y="32" font-family="'Plus Jakarta Sans', sans-serif" font-size="17" font-weight="600" fill="#1B3A5C">Oil Viscosity vs. Temperature</text>

  <!-- Copyright (upper-right) -->
  <text x="700" y="25" font-family="'Source Sans 3', sans-serif" font-size="10" fill="#6B7280" text-anchor="end">© dolphincentrifuge.com</text>

  <!-- Watermark -->
  <text x="390" y="250" font-family="'Plus Jakarta Sans', sans-serif" font-size="40" font-weight="700" fill="#1B3A5C" opacity="0.06" text-anchor="middle" dominant-baseline="middle">DOLPHIN CENTRIFUGE</text>

  <!-- Plot area: 560w x 340h -->
  <g transform="translate(85, 48)">
    <!-- Left Y-axis (Viscosity 0-2000) -->
    <line x1="0" y1="0" x2="0" y2="340" stroke="#374151" stroke-width="1"/>
    <polygon points="-4,5 0,-2 4,5" fill="#374151"/>

    <!-- Right Y-axis (Density 0.690-0.890) -->
    <line x1="560" y1="0" x2="560" y2="340" stroke="#374151" stroke-width="1"/>
    <polygon points="556,5 560,-2 564,5" fill="#374151"/>

    <!-- X-axis -->
    <line x1="0" y1="340" x2="560" y2="340" stroke="#374151" stroke-width="1"/>
    <polygon points="555,336 562,340 555,344" fill="#374151"/>

    <!-- LEFT Y ticks: 0-2000, each 200 = 34px. Value V → 340 - (V/2000)*340 -->
    <line x1="-5" y1="340" x2="0" y2="340" stroke="#374151" stroke-width="1"/>
    <text x="-8" y="344" font-family="'Source Sans 3', sans-serif" font-size="11" fill="#1B3A5C" text-anchor="end">0</text>

    <line x1="-5" y1="306" x2="0" y2="306" stroke="#374151" stroke-width="1"/>
    <text x="-8" y="310" font-family="'Source Sans 3', sans-serif" font-size="11" fill="#1B3A5C" text-anchor="end">200</text>

    <line x1="-5" y1="272" x2="0" y2="272" stroke="#374151" stroke-width="1"/>
    <text x="-8" y="276" font-family="'Source Sans 3', sans-serif" font-size="11" fill="#1B3A5C" text-anchor="end">400</text>

    <line x1="-5" y1="238" x2="0" y2="238" stroke="#374151" stroke-width="1"/>
    <text x="-8" y="242" font-family="'Source Sans 3', sans-serif" font-size="11" fill="#1B3A5C" text-anchor="end">600</text>

    <line x1="-5" y1="204" x2="0" y2="204" stroke="#374151" stroke-width="1"/>
    <text x="-8" y="208" font-family="'Source Sans 3', sans-serif" font-size="11" fill="#1B3A5C" text-anchor="end">800</text>

    <line x1="-5" y1="170" x2="0" y2="170" stroke="#374151" stroke-width="1"/>
    <text x="-8" y="174" font-family="'Source Sans 3', sans-serif" font-size="11" fill="#1B3A5C" text-anchor="end">1000</text>

    <line x1="-5" y1="136" x2="0" y2="136" stroke="#374151" stroke-width="1"/>
    <text x="-8" y="140" font-family="'Source Sans 3', sans-serif" font-size="11" fill="#1B3A5C" text-anchor="end">1200</text>

    <line x1="-5" y1="102" x2="0" y2="102" stroke="#374151" stroke-width="1"/>
    <text x="-8" y="106" font-family="'Source Sans 3', sans-serif" font-size="11" fill="#1B3A5C" text-anchor="end">1400</text>

    <line x1="-5" y1="68" x2="0" y2="68" stroke="#374151" stroke-width="1"/>
    <text x="-8" y="72" font-family="'Source Sans 3', sans-serif" font-size="11" fill="#1B3A5C" text-anchor="end">1600</text>

    <line x1="-5" y1="34" x2="0" y2="34" stroke="#374151" stroke-width="1"/>
    <text x="-8" y="38" font-family="'Source Sans 3', sans-serif" font-size="11" fill="#1B3A5C" text-anchor="end">1800</text>

    <line x1="-5" y1="0" x2="0" y2="0" stroke="#374151" stroke-width="1"/>
    <text x="-8" y="4" font-family="'Source Sans 3', sans-serif" font-size="11" fill="#1B3A5C" text-anchor="end">2000</text>

    <!-- RIGHT Y ticks: 0.690-0.890, range=0.200, each 0.010 = 17px -->
    <!-- 0.890 at y=0, 0.690 at y=340 -->
    <line x1="560" y1="340" x2="565" y2="340" stroke="#374151" stroke-width="1"/>
    <text x="570" y="344" font-family="'Source Sans 3', sans-serif" font-size="11" fill="#6B7280">0.690</text>

    <line x1="560" y1="306" x2="565" y2="306" stroke="#374151" stroke-width="1"/>
    <text x="570" y="310" font-family="'Source Sans 3', sans-serif" font-size="11" fill="#6B7280">0.710</text>

    <line x1="560" y1="272" x2="565" y2="272" stroke="#374151" stroke-width="1"/>
    <text x="570" y="276" font-family="'Source Sans 3', sans-serif" font-size="11" fill="#6B7280">0.730</text>

    <line x1="560" y1="238" x2="565" y2="238" stroke="#374151" stroke-width="1"/>
    <text x="570" y="242" font-family="'Source Sans 3', sans-serif" font-size="11" fill="#6B7280">0.750</text>

    <line x1="560" y1="204" x2="565" y2="204" stroke="#374151" stroke-width="1"/>
    <text x="570" y="208" font-family="'Source Sans 3', sans-serif" font-size="11" fill="#6B7280">0.770</text>

    <line x1="560" y1="170" x2="565" y2="170" stroke="#374151" stroke-width="1"/>
    <text x="570" y="174" font-family="'Source Sans 3', sans-serif" font-size="11" fill="#6B7280">0.790</text>

    <line x1="560" y1="136" x2="565" y2="136" stroke="#374151" stroke-width="1"/>
    <text x="570" y="140" font-family="'Source Sans 3', sans-serif" font-size="11" fill="#6B7280">0.810</text>

    <line x1="560" y1="102" x2="565" y2="102" stroke="#374151" stroke-width="1"/>
    <text x="570" y="106" font-family="'Source Sans 3', sans-serif" font-size="11" fill="#6B7280">0.830</text>

    <line x1="560" y1="68" x2="565" y2="68" stroke="#374151" stroke-width="1"/>
    <text x="570" y="72" font-family="'Source Sans 3', sans-serif" font-size="11" fill="#6B7280">0.850</text>

    <line x1="560" y1="34" x2="565" y2="34" stroke="#374151" stroke-width="1"/>
    <text x="570" y="38" font-family="'Source Sans 3', sans-serif" font-size="11" fill="#6B7280">0.870</text>

    <line x1="560" y1="0" x2="565" y2="0" stroke="#374151" stroke-width="1"/>
    <text x="570" y="4" font-family="'Source Sans 3', sans-serif" font-size="11" fill="#6B7280">0.890</text>

    <!-- X-axis ticks: 0-100°C, each 10°C = 56px -->
    <line x1="0" y1="340" x2="0" y2="345" stroke="#374151" stroke-width="1"/>
    <text x="0" y="358" font-family="'Source Sans 3', sans-serif" font-size="11" fill="#1B3A5C" text-anchor="middle">0</text>
    <line x1="56" y1="340" x2="56" y2="345" stroke="#374151" stroke-width="1"/>
    <text x="56" y="358" font-family="'Source Sans 3', sans-serif" font-size="11" fill="#1B3A5C" text-anchor="middle">10</text>
    <line x1="112" y1="340" x2="112" y2="345" stroke="#374151" stroke-width="1"/>
    <text x="112" y="358" font-family="'Source Sans 3', sans-serif" font-size="11" fill="#1B3A5C" text-anchor="middle">20</text>
    <line x1="168" y1="340" x2="168" y2="345" stroke="#374151" stroke-width="1"/>
    <text x="168" y="358" font-family="'Source Sans 3', sans-serif" font-size="11" fill="#1B3A5C" text-anchor="middle">30</text>
    <line x1="224" y1="340" x2="224" y2="345" stroke="#374151" stroke-width="1"/>
    <text x="224" y="358" font-family="'Source Sans 3', sans-serif" font-size="11" fill="#1B3A5C" text-anchor="middle">40</text>
    <line x1="280" y1="340" x2="280" y2="345" stroke="#374151" stroke-width="1"/>
    <text x="280" y="358" font-family="'Source Sans 3', sans-serif" font-size="11" fill="#1B3A5C" text-anchor="middle">50</text>
    <line x1="336" y1="340" x2="336" y2="345" stroke="#374151" stroke-width="1"/>
    <text x="336" y="358" font-family="'Source Sans 3', sans-serif" font-size="11" fill="#1B3A5C" text-anchor="middle">60</text>
    <line x1="392" y1="340" x2="392" y2="345" stroke="#374151" stroke-width="1"/>
    <text x="392" y="358" font-family="'Source Sans 3', sans-serif" font-size="11" fill="#1B3A5C" text-anchor="middle">70</text>
    <line x1="448" y1="340" x2="448" y2="345" stroke="#374151" stroke-width="1"/>
    <text x="448" y="358" font-family="'Source Sans 3', sans-serif" font-size="11" fill="#1B3A5C" text-anchor="middle">80</text>
    <line x1="504" y1="340" x2="504" y2="345" stroke="#374151" stroke-width="1"/>
    <text x="504" y="358" font-family="'Source Sans 3', sans-serif" font-size="11" fill="#1B3A5C" text-anchor="middle">90</text>
    <line x1="560" y1="340" x2="560" y2="345" stroke="#374151" stroke-width="1"/>
    <text x="560" y="358" font-family="'Source Sans 3', sans-serif" font-size="11" fill="#1B3A5C" text-anchor="middle">100</text>

    <!-- CURVE 1: Kinematic Viscosity (Navy solid) — LEFT axis -->
    <!-- Data read from original: 0°C=850, 10°C=450, 20°C=250, 30°C=175, 40°C=120, 50°C=75, 60°C=50, 70°C=35, 80°C=25, 90°C=18, 100°C=12 -->
    <!-- Scale: value V → y = 340 - (V/2000)*340 -->
    <!-- 850→195.5, 450→263.5, 250→297.5, 175→310.3, 120→319.6, 75→327.3, 50→331.5, 35→334.1, 25→335.8, 18→336.9, 12→338.0 -->
    <polyline points="0,195.5 56,263.5 112,297.5 168,310.3 224,319.6 280,327.3 336,331.5 392,334.1 448,335.8 504,336.9 560,338.0"
              fill="none" stroke="#1B3A5C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="0" cy="195.5" r="2.5" fill="#1B3A5C"/>
    <circle cx="56" cy="263.5" r="2.5" fill="#1B3A5C"/>
    <circle cx="112" cy="297.5" r="2.5" fill="#1B3A5C"/>
    <circle cx="168" cy="310.3" r="2.5" fill="#1B3A5C"/>
    <circle cx="224" cy="319.6" r="2.5" fill="#1B3A5C"/>
    <circle cx="280" cy="327.3" r="2.5" fill="#1B3A5C"/>
    <circle cx="336" cy="331.5" r="2.5" fill="#1B3A5C"/>
    <circle cx="392" cy="334.1" r="2.5" fill="#1B3A5C"/>
    <circle cx="448" cy="335.8" r="2.5" fill="#1B3A5C"/>
    <circle cx="504" cy="336.9" r="2.5" fill="#1B3A5C"/>
    <circle cx="560" cy="338.0" r="2.5" fill="#1B3A5C"/>

    <!-- Inline label for viscosity -->
    <rect x="62" y="248" width="175" height="17" fill="#F5F5F0" rx="3"/>
    <text x="149" y="261" font-family="'Source Sans 3', sans-serif" font-size="12" fill="#1B3A5C" font-weight="600" text-anchor="middle">kinematic viscosity [mm²/s]</text>

    <!-- CURVE 2: Density (Gold dashed) — RIGHT axis -->
    <!-- Data: 0°C=0.880, 10=0.872, 20=0.863, 30=0.855, 40=0.847, 50=0.838, 60=0.828, 70=0.818, 80=0.808, 90=0.798, 100=0.790 -->
    <!-- Scale: value V → y = (0.890 - V) / 0.200 * 340 -->
    <!-- 0.880→17, 0.872→30.6, 0.863→45.9, 0.855→59.5, 0.847→73.1, 0.838→88.4, 0.828→105.4, 0.818→122.4, 0.808→139.4, 0.798→156.4, 0.790→170 -->
    <polyline points="0,17.0 56,30.6 112,45.9 168,59.5 224,73.1 280,88.4 336,105.4 392,122.4 448,139.4 504,156.4 560,170.0"
              fill="none" stroke="#E8A317" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="0" cy="17.0" r="2.5" fill="#E8A317"/>
    <circle cx="56" cy="30.6" r="2.5" fill="#E8A317"/>
    <circle cx="112" cy="45.9" r="2.5" fill="#E8A317"/>
    <circle cx="168" cy="59.5" r="2.5" fill="#E8A317"/>
    <circle cx="224" cy="73.1" r="2.5" fill="#E8A317"/>
    <circle cx="280" cy="88.4" r="2.5" fill="#E8A317"/>
    <circle cx="336" cy="105.4" r="2.5" fill="#E8A317"/>
    <circle cx="392" cy="122.4" r="2.5" fill="#E8A317"/>
    <circle cx="448" cy="139.4" r="2.5" fill="#E8A317"/>
    <circle cx="504" cy="156.4" r="2.5" fill="#E8A317"/>
    <circle cx="560" cy="170.0" r="2.5" fill="#E8A317"/>

    <!-- Inline label for density -->
    <rect x="62" y="15" width="120" height="17" fill="#F5F5F0" rx="3"/>
    <text x="122" y="28" font-family="'Source Sans 3', sans-serif" font-size="12" fill="#E8A317" font-weight="600" text-anchor="middle">density [g/cm³]</text>
  </g>

  <!-- Left Y-axis label -->
  <text x="20" y="250" font-family="'Source Sans 3', sans-serif" font-size="13" fill="#1B3A5C" transform="rotate(-90, 20, 250)" text-anchor="middle">Kinematic Viscosity [mm²/s]</text>

  <!-- Right Y-axis label -->
  <text x="755" y="250" font-family="'Source Sans 3', sans-serif" font-size="13" fill="#6B7280" transform="rotate(90, 755, 250)" text-anchor="middle">Density [g/cm³]</text>

  <!-- X-axis label -->
  <text x="370" y="440" font-family="'Source Sans 3', sans-serif" font-size="14" fill="#1B3A5C" text-anchor="middle" font-weight="600">Temperature [°C]</text>
</svg>