<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 460" role="img" aria-label="Decanter centrifuge performance optimization curves — solids recovery vs bowl speed">
  <desc>Performance curve showing how centrifuge bowl speed affects solids recovery. Theoretical recovery increases linearly. Coarse solids peak at moderate-high speeds. Soft solids peak earlier and lower, then decline significantly.</desc>

  <!-- Background -->
  <rect x="0" y="0" width="780" height="460" fill="#F5F5F0" rx="8" ry="8" stroke="#D1D5DB" stroke-width="1"/>

  <!-- Title -->
  <text x="80" y="35" font-family="'Plus Jakarta Sans', sans-serif" font-size="17" font-weight="600" fill="#1B3A5C">Bowl Speed vs. Solids Recovery</text>

  <!-- Copyright -->
  <text x="720" y="25" font-family="'Source Sans 3', sans-serif" font-size="10" fill="#6B7280" text-anchor="end">© dolphincentrifuge.com</text>

  <!-- Watermark -->
  <text x="405" y="235" font-family="'Plus Jakarta Sans', sans-serif" font-size="42" font-weight="700" fill="#1B3A5C" opacity="0.06" text-anchor="middle" dominant-baseline="middle">DOLPHIN CENTRIFUGE</text>

  <!--
  PIXEL COORDINATE CALCULATIONS:
  Plot area: 600w × 330h, origin at transform(80,55)
  X: (gridX/10) × 600     Y: 330 - (gridY/10) × 330

  Theoretical (straight line):
    (0,320) → (540,0) exits chart top — clipped

  Coarse Solids (11 points, Catmull-Rom bezier):
    P0(0,320) P1(60,304) P2(120,264) P3(180,215) P4(240,172)
    P5(300,139) P6(360,116) P7(420,106) P8(480,119) P9(540,145) P10(600,172)

  Soft Solids (11 points, Catmull-Rom bezier):
    P0(0,323) P1(60,314) P2(120,290) P3(180,264) P4(240,238)
    P5(300,231) P6(360,241) P7(420,261) P8(480,284) P9(540,307) P10(600,323)
  -->

  <!-- Plot area -->
  <g transform="translate(80, 55)">
    <defs>
      <clipPath id="plotClip">
        <rect x="0" y="0" width="610" height="335"/>
      </clipPath>
    </defs>

    <!-- Y-axis -->
    <line x1="0" y1="0" x2="0" y2="330" stroke="#374151" stroke-width="1"/>
    <polygon points="-4,5 0,-2 4,5" fill="#374151"/>

    <!-- X-axis -->
    <line x1="0" y1="330" x2="620" y2="330" stroke="#374151" stroke-width="1"/>
    <polygon points="615,326 622,330 615,334" fill="#374151"/>

    <!-- Optimum Speed Range: verticals at x=3.5 (210px) and x=6.0 (360px) -->
    <line x1="210" y1="8" x2="210" y2="330" stroke="#9CA3AF" stroke-width="0.8" stroke-dasharray="5,3"/>
    <line x1="360" y1="8" x2="360" y2="330" stroke="#9CA3AF" stroke-width="0.8" stroke-dasharray="5,3"/>

    <!-- Bracket annotation at bottom -->
    <line x1="210" y1="310" x2="210" y2="322" stroke="#374151" stroke-width="0.8"/>
    <line x1="360" y1="310" x2="360" y2="322" stroke="#374151" stroke-width="0.8"/>
    <line x1="210" y1="322" x2="360" y2="322" stroke="#374151" stroke-width="0.8"/>
    <rect x="228" y="305" width="124" height="16" fill="#F5F5F0" rx="2"/>
    <text x="290" y="316" font-family="'Source Sans 3', sans-serif" font-size="11" fill="#374151" text-anchor="middle" font-weight="600">Optimum Speed Range</text>
    <text x="210" y="346" font-family="'Source Sans 3', sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">Soft</text>
    <text x="360" y="346" font-family="'Source Sans 3', sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">Coarse</text>

    <!-- CURVE 1: Theoretical — Navy STRAIGHT line, clipped at chart top -->
    <line x1="0" y1="320" x2="540" y2="0" stroke="#1B3A5C" stroke-width="2" stroke-linecap="round" clip-path="url(#plotClip)"/>
    <!-- Label -->
    <rect x="476" y="18" width="86" height="17" fill="#F5F5F0" rx="3" opacity="0.85"/>
    <text x="519" y="31" font-family="'Source Sans 3', sans-serif" font-size="12" fill="#1B3A5C" font-weight="600" text-anchor="middle">Theoretical</text>

    <!-- CURVE 2: Coarse Solids — Gold smooth curve, peaks at x=7 -->
    <!-- Catmull-Rom control points computed from extracted data -->
    <path d="M 0,320 C 10,317 40,313 60,304 C 80,295 100,279 120,264 C 140,249 160,230 180,215 C 200,200 220,185 240,172 C 260,159 280,148 300,139 C 320,130 340,122 360,116 C 380,111 400,106 420,106 C 440,107 460,113 480,119 C 500,126 520,136 540,145 C 560,154 590,168 600,172"
          fill="none" stroke="#E8A317" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Data point markers -->
    <circle cx="0" cy="320" r="2.5" fill="#E8A317"/>
    <circle cx="60" cy="304" r="2.5" fill="#E8A317"/>
    <circle cx="120" cy="264" r="2.5" fill="#E8A317"/>
    <circle cx="180" cy="215" r="2.5" fill="#E8A317"/>
    <circle cx="240" cy="172" r="2.5" fill="#E8A317"/>
    <circle cx="300" cy="139" r="2.5" fill="#E8A317"/>
    <circle cx="360" cy="116" r="2.5" fill="#E8A317"/>
    <circle cx="420" cy="106" r="2.5" fill="#E8A317"/>
    <circle cx="480" cy="119" r="2.5" fill="#E8A317"/>
    <circle cx="540" cy="145" r="2.5" fill="#E8A317"/>
    <circle cx="600" cy="172" r="2.5" fill="#E8A317"/>
    <!-- Label -->
    <rect x="530" y="155" width="100" height="17" fill="#F5F5F0" rx="3" opacity="0.85"/>
    <text x="580" y="168" font-family="'Source Sans 3', sans-serif" font-size="12" fill="#E8A317" font-weight="600" text-anchor="middle">Coarse Solids</text>

    <!-- CURVE 3: Soft Solids — Gray dashed, peaks at x=5, drops back -->
    <path d="M 0,323 C 10,322 40,320 60,314 C 80,309 100,298 120,290 C 140,282 160,273 180,264 C 200,255 220,244 240,238 C 260,233 280,231 300,231 C 320,232 340,236 360,241 C 380,246 400,254 420,261 C 440,268 460,276 480,284 C 500,292 520,301 540,307 C 560,314 590,320 600,323"
          fill="none" stroke="#6B7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8,4"/>
    <!-- Data point markers -->
    <circle cx="0" cy="323" r="2.5" fill="#6B7280"/>
    <circle cx="60" cy="314" r="2.5" fill="#6B7280"/>
    <circle cx="120" cy="290" r="2.5" fill="#6B7280"/>
    <circle cx="180" cy="264" r="2.5" fill="#6B7280"/>
    <circle cx="240" cy="238" r="2.5" fill="#6B7280"/>
    <circle cx="300" cy="231" r="2.5" fill="#6B7280"/>
    <circle cx="360" cy="241" r="2.5" fill="#6B7280"/>
    <circle cx="420" cy="261" r="2.5" fill="#6B7280"/>
    <circle cx="480" cy="284" r="2.5" fill="#6B7280"/>
    <circle cx="540" cy="307" r="2.5" fill="#6B7280"/>
    <circle cx="600" cy="323" r="2.5" fill="#6B7280"/>
    <!-- Label -->
    <rect x="535" y="306" width="80" height="17" fill="#F5F5F0" rx="3" opacity="0.85"/>
    <text x="575" y="319" font-family="'Source Sans 3', sans-serif" font-size="12" fill="#6B7280" font-weight="600" text-anchor="middle">Soft Solids</text>
  </g>

  <!-- Y-axis label -->
  <text x="22" y="240" font-family="'Source Sans 3', sans-serif" font-size="13" fill="#1B3A5C" transform="rotate(-90, 22, 240)" text-anchor="middle">Solids Recovery - %</text>

  <!-- X-axis labels -->
  <text x="115" y="430" font-family="'Source Sans 3', sans-serif" font-size="12" fill="#6B7280">&lt;&lt;&lt; Low</text>
  <text x="390" y="435" font-family="'Source Sans 3', sans-serif" font-size="14" fill="#1B3A5C" text-anchor="middle" font-weight="600">BOWL SPEED</text>
  <text x="665" y="430" font-family="'Source Sans 3', sans-serif" font-size="12" fill="#6B7280" text-anchor="end">High &gt;&gt;&gt;</text>
</svg>