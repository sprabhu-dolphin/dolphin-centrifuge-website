<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 460" role="img" aria-label="Oil Viscosity versus Temperature Graph showing inverse relationship">
  <desc>Dual-axis graph showing how oil kinematic viscosity (mm²/s) and density (g/cm³) both decrease as temperature increases from 0°C to 100°C. Viscosity drops steeply as an exponential decay from ~850 at 0°C to near zero. Density declines gently and linearly from 0.880 to 0.802.</desc>

  <!-- Background -->
  <rect x="0" y="0" width="780" height="460" fill="#F5F5F0" rx="8" ry="8" stroke="#D1D5DB" stroke-width="1"/>

  <!-- Title -->
  <text x="90" y="35" font-family="'Plus Jakarta Sans', sans-serif" font-size="17" font-weight="600" fill="#1B3A5C">Oil Viscosity vs. Temperature</text>

  <!-- Copyright -->
  <text x="720" y="25" font-family="'Source Sans 3', sans-serif" font-size="10" fill="#6B7280" text-anchor="end">© dolphincentrifuge.com</text>

  <!-- Watermark -->
  <text x="405" y="235" font-family="'Plus Jakarta Sans', sans-serif" font-size="42" font-weight="700" fill="#1B3A5C" opacity="0.06" text-anchor="middle" dominant-baseline="middle">DOLPHIN CENTRIFUGE</text>

  <!--
  PIXEL COORDINATE CALCULATIONS:
  Plot area: 560w × 340h, origin at translate(90, 50)
  Left Y-axis: 0-2000 mm²/s. y = 340 - (val/2000)*340
  Right Y-axis: 0.790-0.890 g/cm³. y = 340 - ((val-0.790)/0.100)*340
  X-axis: 0-100°C. x = (temp/100)*560

  Viscosity (navy, left axis):
    0°C,850 → (0,195.5)   10°C,250 → (56,297.5)   20°C,100 → (112,323)
    30°C,42 → (168,332.9)  40°C,22 → (224,336.3)   50°C,15 → (280,337.5)
    60°C,10 → (336,338.3)  70°C,7 → (392,338.8)    80°C,5 → (448,339.2)
    90°C,4 → (504,339.3)   100°C,3 → (560,339.5)

  Density (gold dashed, right axis):
    0°C,0.880 → (0,34)     10°C,0.872 → (56,61.2)  20°C,0.862 → (112,95.2)
    30°C,0.856 → (168,115.6) 40°C,0.848 → (224,142.8) 50°C,0.840 → (280,170)
    60°C,0.832 → (336,197.2) 70°C,0.825 → (392,221)  80°C,0.818 → (448,244.8)
    90°C,0.810 → (504,272)   100°C,0.802 → (560,299.2)
  -->

  <!-- Plot area -->
  <g transform="translate(90, 50)">
    <!-- Left Y-axis -->
    <line x1="0" y1="0" x2="0" y2="340" stroke="#374151" stroke-width="1"/>
    <polygon points="-4,5 0,-2 4,5" fill="#374151"/>

    <!-- Right Y-axis -->
    <line x1="560" y1="0" x2="560" y2="340" stroke="#374151" stroke-width="1"/>
    <polygon points="556,5 560,-2 564,5" fill="#374151"/>

    <!-- X-axis -->
    <line x1="0" y1="340" x2="560" y2="340" stroke="#374151" stroke-width="1"/>

    <!-- Left Y-axis tick marks and labels (0-2000, every 200) -->
    <line x1="-5" y1="340" x2="0" y2="340" stroke="#374151" stroke-width="0.8"/>
    <text x="-10" y="344" font-family="'Source Sans 3', sans-serif" font-size="10" fill="#6B7280" text-anchor="end">0</text>

    <line x1="-5" y1="306" x2="0" y2="306" stroke="#374151" stroke-width="0.8"/>
    <text x="-10" y="310" font-family="'Source Sans 3', sans-serif" font-size="10" fill="#6B7280" text-anchor="end">200</text>

    <line x1="-5" y1="272" x2="0" y2="272" stroke="#374151" stroke-width="0.8"/>
    <text x="-10" y="276" font-family="'Source Sans 3', sans-serif" font-size="10" fill="#6B7280" text-anchor="end">400</text>

    <line x1="-5" y1="238" x2="0" y2="238" stroke="#374151" stroke-width="0.8"/>
    <text x="-10" y="242" font-family="'Source Sans 3', sans-serif" font-size="10" fill="#6B7280" text-anchor="end">600</text>

    <line x1="-5" y1="204" x2="0" y2="204" stroke="#374151" stroke-width="0.8"/>
    <text x="-10" y="208" font-family="'Source Sans 3', sans-serif" font-size="10" fill="#6B7280" text-anchor="end">800</text>

    <line x1="-5" y1="170" x2="0" y2="170" stroke="#374151" stroke-width="0.8"/>
    <text x="-10" y="174" font-family="'Source Sans 3', sans-serif" font-size="10" fill="#6B7280" text-anchor="end">1000</text>

    <line x1="-5" y1="136" x2="0" y2="136" stroke="#374151" stroke-width="0.8"/>
    <text x="-10" y="140" font-family="'Source Sans 3', sans-serif" font-size="10" fill="#6B7280" text-anchor="end">1200</text>

    <line x1="-5" y1="102" x2="0" y2="102" stroke="#374151" stroke-width="0.8"/>
    <text x="-10" y="106" font-family="'Source Sans 3', sans-serif" font-size="10" fill="#6B7280" text-anchor="end">1400</text>

    <line x1="-5" y1="68" x2="0" y2="68" stroke="#374151" stroke-width="0.8"/>
    <text x="-10" y="72" font-family="'Source Sans 3', sans-serif" font-size="10" fill="#6B7280" text-anchor="end">1600</text>

    <line x1="-5" y1="34" x2="0" y2="34" stroke="#374151" stroke-width="0.8"/>
    <text x="-10" y="38" font-family="'Source Sans 3', sans-serif" font-size="10" fill="#6B7280" text-anchor="end">1800</text>

    <line x1="-5" y1="0" x2="0" y2="0" stroke="#374151" stroke-width="0.8"/>
    <text x="-10" y="4" font-family="'Source Sans 3', sans-serif" font-size="10" fill="#6B7280" text-anchor="end">2000</text>

    <!-- Right Y-axis tick marks and labels (0.790-0.890, every 0.010) -->
    <line x1="560" y1="340" x2="565" y2="340" stroke="#374151" stroke-width="0.8"/>
    <text x="570" y="344" font-family="'Source Sans 3', sans-serif" font-size="10" fill="#6B7280">0.790</text>

    <line x1="560" y1="306" x2="565" y2="306" stroke="#374151" stroke-width="0.8"/>
    <text x="570" y="310" font-family="'Source Sans 3', sans-serif" font-size="10" fill="#6B7280">0.800</text>

    <line x1="560" y1="272" x2="565" y2="272" stroke="#374151" stroke-width="0.8"/>
    <text x="570" y="276" font-family="'Source Sans 3', sans-serif" font-size="10" fill="#6B7280">0.810</text>

    <line x1="560" y1="238" x2="565" y2="238" stroke="#374151" stroke-width="0.8"/>
    <text x="570" y="242" font-family="'Source Sans 3', sans-serif" font-size="10" fill="#6B7280">0.820</text>

    <line x1="560" y1="204" x2="565" y2="204" stroke="#374151" stroke-width="0.8"/>
    <text x="570" y="208" font-family="'Source Sans 3', sans-serif" font-size="10" fill="#6B7280">0.830</text>

    <line x1="560" y1="170" x2="565" y2="170" stroke="#374151" stroke-width="0.8"/>
    <text x="570" y="174" font-family="'Source Sans 3', sans-serif" font-size="10" fill="#6B7280">0.840</text>

    <line x1="560" y1="136" x2="565" y2="136" stroke="#374151" stroke-width="0.8"/>
    <text x="570" y="140" font-family="'Source Sans 3', sans-serif" font-size="10" fill="#6B7280">0.850</text>

    <line x1="560" y1="102" x2="565" y2="102" stroke="#374151" stroke-width="0.8"/>
    <text x="570" y="106" font-family="'Source Sans 3', sans-serif" font-size="10" fill="#6B7280">0.860</text>

    <line x1="560" y1="68" x2="565" y2="68" stroke="#374151" stroke-width="0.8"/>
    <text x="570" y="72" font-family="'Source Sans 3', sans-serif" font-size="10" fill="#6B7280">0.870</text>

    <line x1="560" y1="34" x2="565" y2="34" stroke="#374151" stroke-width="0.8"/>
    <text x="570" y="38" font-family="'Source Sans 3', sans-serif" font-size="10" fill="#6B7280">0.880</text>

    <line x1="560" y1="0" x2="565" y2="0" stroke="#374151" stroke-width="0.8"/>
    <text x="570" y="4" font-family="'Source Sans 3', sans-serif" font-size="10" fill="#6B7280">0.890</text>

    <!-- X-axis tick marks and labels (0-100°C, every 10) -->
    <line x1="0" y1="340" x2="0" y2="345" stroke="#374151" stroke-width="0.8"/>
    <text x="0" y="358" font-family="'Source Sans 3', sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">0</text>

    <line x1="56" y1="340" x2="56" y2="345" stroke="#374151" stroke-width="0.8"/>
    <text x="56" y="358" font-family="'Source Sans 3', sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">10</text>

    <line x1="112" y1="340" x2="112" y2="345" stroke="#374151" stroke-width="0.8"/>
    <text x="112" y="358" font-family="'Source Sans 3', sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">20</text>

    <line x1="168" y1="340" x2="168" y2="345" stroke="#374151" stroke-width="0.8"/>
    <text x="168" y="358" font-family="'Source Sans 3', sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">30</text>

    <line x1="224" y1="340" x2="224" y2="345" stroke="#374151" stroke-width="0.8"/>
    <text x="224" y="358" font-family="'Source Sans 3', sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">40</text>

    <line x1="280" y1="340" x2="280" y2="345" stroke="#374151" stroke-width="0.8"/>
    <text x="280" y="358" font-family="'Source Sans 3', sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">50</text>

    <line x1="336" y1="340" x2="336" y2="345" stroke="#374151" stroke-width="0.8"/>
    <text x="336" y="358" font-family="'Source Sans 3', sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">60</text>

    <line x1="392" y1="340" x2="392" y2="345" stroke="#374151" stroke-width="0.8"/>
    <text x="392" y="358" font-family="'Source Sans 3', sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">70</text>

    <line x1="448" y1="340" x2="448" y2="345" stroke="#374151" stroke-width="0.8"/>
    <text x="448" y="358" font-family="'Source Sans 3', sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">80</text>

    <line x1="504" y1="340" x2="504" y2="345" stroke="#374151" stroke-width="0.8"/>
    <text x="504" y="358" font-family="'Source Sans 3', sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">90</text>

    <line x1="560" y1="340" x2="560" y2="345" stroke="#374151" stroke-width="0.8"/>
    <text x="560" y="358" font-family="'Source Sans 3', sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">100</text>

    <!-- CURVE 1: Viscosity — Navy solid, exponential decay, LEFT axis -->
    <!-- Catmull-Rom through: (0,196) (56,298) (112,323) (168,333) (224,336) (280,338) (336,338) (392,339) (448,339) (504,339) (560,340) -->
    <path d="M 0,196 C 9,213 37,280 56,298 C 75,316 93,319 112,323 C 131,327 149,331 168,333 C 187,335 205,335 224,336 C 243,337 261,337 280,338 C 299,338 317,338 336,338 C 355,339 373,339 392,339 C 411,339 429,339 448,339 C 467,339 485,339 504,339 C 523,340 541,340 560,340"
          fill="none" stroke="#1B3A5C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Data point markers -->
    <circle cx="0" cy="196" r="2.5" fill="#1B3A5C"/>
    <circle cx="56" cy="298" r="2.5" fill="#1B3A5C"/>
    <circle cx="112" cy="323" r="2.5" fill="#1B3A5C"/>
    <circle cx="168" cy="333" r="2.5" fill="#1B3A5C"/>
    <circle cx="224" cy="336" r="2.5" fill="#1B3A5C"/>
    <circle cx="280" cy="338" r="2.5" fill="#1B3A5C"/>
    <circle cx="336" cy="338" r="2.5" fill="#1B3A5C"/>
    <circle cx="392" cy="339" r="2.5" fill="#1B3A5C"/>
    <circle cx="448" cy="339" r="2.5" fill="#1B3A5C"/>
    <circle cx="504" cy="339" r="2.5" fill="#1B3A5C"/>
    <circle cx="560" cy="340" r="2.5" fill="#1B3A5C"/>
    <!-- Inline label near steep section -->
    <rect x="60" y="258" width="175" height="17" fill="#F5F5F0" rx="3" opacity="0.85"/>
    <text x="147" y="271" font-family="'Source Sans 3', sans-serif" font-size="12" fill="#1B3A5C" font-weight="600" text-anchor="middle">kinematic viscosity [mm²/s]</text>

    <!-- CURVE 2: Density — Gold dashed, gentle linear decline, RIGHT axis -->
    <!-- Through: (0,34) (56,61) (112,95) (168,116) (224,143) (280,170) (336,197) (392,221) (448,245) (504,272) (560,299) -->
    <path d="M 0,34 C 19,43 37,52 56,61 C 75,70 93,86 112,95 C 131,104 149,109 168,116 C 187,123 205,135 224,143 C 243,151 261,162 280,170 C 299,178 317,189 336,197 C 355,205 373,213 392,221 C 411,229 429,237 448,245 C 467,253 485,264 504,272 C 523,280 541,291 560,299"
          fill="none" stroke="#E8A317" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8,4"/>
    <!-- Data point markers (diamond-shaped) -->
    <rect x="-3" y="31" width="6" height="6" fill="#E8A317" transform="rotate(45, 0, 34)"/>
    <rect x="53" y="58" width="6" height="6" fill="#E8A317" transform="rotate(45, 56, 61)"/>
    <rect x="109" y="92" width="6" height="6" fill="#E8A317" transform="rotate(45, 112, 95)"/>
    <rect x="165" y="113" width="6" height="6" fill="#E8A317" transform="rotate(45, 168, 116)"/>
    <rect x="221" y="140" width="6" height="6" fill="#E8A317" transform="rotate(45, 224, 143)"/>
    <rect x="277" y="167" width="6" height="6" fill="#E8A317" transform="rotate(45, 280, 170)"/>
    <rect x="333" y="194" width="6" height="6" fill="#E8A317" transform="rotate(45, 336, 197)"/>
    <rect x="389" y="218" width="6" height="6" fill="#E8A317" transform="rotate(45, 392, 221)"/>
    <rect x="445" y="242" width="6" height="6" fill="#E8A317" transform="rotate(45, 448, 245)"/>
    <rect x="501" y="269" width="6" height="6" fill="#E8A317" transform="rotate(45, 504, 272)"/>
    <rect x="557" y="296" width="6" height="6" fill="#E8A317" transform="rotate(45, 560, 299)"/>
    <!-- Inline label near top -->
    <rect x="68" y="50" width="105" height="17" fill="#F5F5F0" rx="3" opacity="0.85"/>
    <text x="120" y="63" font-family="'Source Sans 3', sans-serif" font-size="12" fill="#E8A317" font-weight="600" text-anchor="middle">density [g/cm³]</text>
  </g>

  <!-- Left Y-axis label -->
  <text x="18" y="240" font-family="'Source Sans 3', sans-serif" font-size="13" fill="#1B3A5C" transform="rotate(-90, 18, 240)" text-anchor="middle">Kinematic Viscosity [mm²/s]</text>

  <!-- Right Y-axis label -->
  <text x="758" y="240" font-family="'Source Sans 3', sans-serif" font-size="13" fill="#E8A317" transform="rotate(90, 758, 240)" text-anchor="middle">Density [g/cm³]</text>

  <!-- X-axis label -->
  <text x="390" y="435" font-family="'Source Sans 3', sans-serif" font-size="14" fill="#1B3A5C" text-anchor="middle" font-weight="600">Temperature [°C]</text>
</svg>