<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Graph showing bowl speed effect on solids recovery for theoretical, coarse solids, and soft solids">
  <desc>Performance curve showing how centrifuge bowl speed affects solids recovery percentage. Theoretical recovery increases linearly. Coarse solids peak at moderate-high speeds. Soft solids peak at lower speeds and decline at high bowl speeds. Optimum speed range is marked between the soft and coarse peaks.</desc>

  <!-- Background -->
  <rect x="0" y="0" width="800" height="500" fill="#F5F5F0" rx="8" ry="8" stroke="#D1D5DB" stroke-width="1"/>

  <!-- Title (top-left) -->
  <text x="80" y="38" font-family="'Plus Jakarta Sans', sans-serif" font-size="18" font-weight="600" fill="#1B3A5C">Bowl Speed vs. Solids Recovery</text>

  <!-- Copyright (upper-right) -->
  <text x="740" y="28" font-family="'Source Sans 3', sans-serif" font-size="10" fill="#6B7280" text-anchor="end">© dolphincentrifuge.com</text>

  <!-- Watermark text (centered, faint) -->
  <text x="400" y="270" font-family="'Plus Jakarta Sans', sans-serif" font-size="48" font-weight="700" fill="#1B3A5C" opacity="0.06" text-anchor="middle" dominant-baseline="middle">DOLPHIN CENTRIFUGE</text>

  <!-- Plot area -->
  <g transform="translate(80, 55)">
    <!-- Grid lines (horizontal) -->
    <line x1="0" y1="0" x2="660" y2="0" stroke="#E5E7EB" stroke-width="0.5" stroke-dasharray="4,4"/>
    <line x1="0" y1="75" x2="660" y2="75" stroke="#E5E7EB" stroke-width="0.5" stroke-dasharray="4,4"/>
    <line x1="0" y1="150" x2="660" y2="150" stroke="#E5E7EB" stroke-width="0.5" stroke-dasharray="4,4"/>
    <line x1="0" y1="225" x2="660" y2="225" stroke="#E5E7EB" stroke-width="0.5" stroke-dasharray="4,4"/>
    <line x1="0" y1="300" x2="660" y2="300" stroke="#E5E7EB" stroke-width="0.5" stroke-dasharray="4,4"/>

    <!-- Y-axis -->
    <line x1="0" y1="0" x2="0" y2="350" stroke="#374151" stroke-width="1"/>
    <!-- X-axis -->
    <line x1="0" y1="350" x2="660" y2="350" stroke="#374151" stroke-width="1"/>

    <!-- Optimum Speed Range shading -->
    <rect x="220" y="0" width="200" height="350" fill="#1B3A5C" opacity="0.04"/>

    <!-- Optimum Speed Range vertical markers -->
    <line x1="220" y1="0" x2="220" y2="350" stroke="#374151" stroke-width="1" stroke-dasharray="6,3"/>
    <line x1="420" y1="0" x2="420" y2="350" stroke="#374151" stroke-width="1" stroke-dasharray="6,3"/>

    <!-- Optimum Speed Range label -->
    <text x="320" y="340" font-family="'Source Sans 3', sans-serif" font-size="12" fill="#374151" text-anchor="middle" font-weight="600">Optimum Speed Range</text>
    <text x="220" y="365" font-family="'Source Sans 3', sans-serif" font-size="11" fill="#374151" text-anchor="middle">Soft</text>
    <text x="420" y="365" font-family="'Source Sans 3', sans-serif" font-size="11" fill="#374151" text-anchor="middle">Coarse</text>

    <!-- Curve 1: Theoretical (Navy - straight line going up) -->
    <polyline points="30,310 110,260 220,195 320,140 420,85 520,35 620,0"
              fill="none" stroke="#1B3A5C" stroke-width="2" stroke-linecap="round"/>
    <circle cx="220" cy="195" r="2.5" fill="#1B3A5C"/>
    <circle cx="420" cy="85" r="2.5" fill="#1B3A5C"/>
    <circle cx="620" cy="0" r="2.5" fill="#1B3A5C"/>
    <!-- Label -->
    <text x="630" y="8" font-family="'Source Sans 3', sans-serif" font-size="13" fill="#1B3A5C" font-weight="600">Theoretical</text>

    <!-- Curve 2: Coarse Solids (Gold - peaks then slowly drops) -->
    <polyline points="30,290 110,230 220,150 320,110 400,95 420,96 480,105 540,120 600,140 640,155"
              fill="none" stroke="#E8A317" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="220" cy="150" r="2.5" fill="#E8A317"/>
    <circle cx="400" cy="95" r="2.5" fill="#E8A317"/>
    <circle cx="540" cy="120" r="2.5" fill="#E8A317"/>
    <!-- Label -->
    <text x="645" y="160" font-family="'Source Sans 3', sans-serif" font-size="13" fill="#E8A317" font-weight="600">Coarse Solids</text>

    <!-- Curve 3: Soft Solids (Gray dashed - peaks early then drops more) -->
    <polyline points="30,305 110,265 180,230 240,210 300,210 360,225 420,250 500,280 580,305 640,320"
              fill="none" stroke="#6B7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8,4"/>
    <circle cx="180" cy="230" r="2.5" fill="#6B7280"/>
    <circle cx="300" cy="210" r="2.5" fill="#6B7280"/>
    <circle cx="500" cy="280" r="2.5" fill="#6B7280"/>
    <!-- Label -->
    <text x="645" y="325" font-family="'Source Sans 3', sans-serif" font-size="13" fill="#6B7280" font-weight="600">Soft Solids</text>
  </g>

  <!-- Y-axis label -->
  <text x="25" y="260" font-family="'Source Sans 3', sans-serif" font-size="13" fill="#1B3A5C" transform="rotate(-90, 25, 260)" text-anchor="middle">Solids Recovery - %</text>

  <!-- X-axis labels -->
  <text x="120" y="440" font-family="'Source Sans 3', sans-serif" font-size="12" fill="#6B7280">&lt;&lt;&lt; Low</text>
  <text x="400" y="445" font-family="'Source Sans 3', sans-serif" font-size="14" fill="#1B3A5C" text-anchor="middle" font-weight="600">BOWL SPEED</text>
  <text x="690" y="440" font-family="'Source Sans 3', sans-serif" font-size="12" fill="#6B7280" text-anchor="end">High &gt;&gt;&gt;</text>

  <!-- Legend (bottom-center) -->
  <g transform="translate(180, 475)">
    <line x1="0" y1="0" x2="25" y2="0" stroke="#1B3A5C" stroke-width="2"/>
    <circle cx="12" cy="0" r="2.5" fill="#1B3A5C"/>
    <text x="30" y="4" font-family="'Source Sans 3', sans-serif" font-size="12" fill="#1B3A5C">Theoretical</text>

    <line x1="140" y1="0" x2="165" y2="0" stroke="#E8A317" stroke-width="2"/>
    <circle cx="152" cy="0" r="2.5" fill="#E8A317"/>
    <text x="170" y="4" font-family="'Source Sans 3', sans-serif" font-size="12" fill="#1B3A5C">Coarse Solids</text>

    <line x1="295" y1="0" x2="320" y2="0" stroke="#6B7280" stroke-width="2" stroke-dasharray="8,4"/>
    <circle cx="307" cy="0" r="2.5" fill="#6B7280"/>
    <text x="325" y="4" font-family="'Source Sans 3', sans-serif" font-size="12" fill="#1B3A5C">Soft Solids</text>
  </g>
</svg>