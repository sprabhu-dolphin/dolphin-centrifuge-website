<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" role="img" aria-label="Graph showing bowl speed effect on solids recovery for theoretical, coarse solids, and soft solids">
  <desc>Performance curve showing how centrifuge bowl speed affects solids recovery percentage. Theoretical recovery increases linearly. Coarse solids peak at moderate-high speeds. Soft solids peak at lower speeds and decline at high bowl speeds. Optimum speed range is marked between the soft and coarse peaks.</desc>

  <!-- Background -->
  <rect x="0" y="0" width="820" height="480" fill="#F5F5F0" rx="8" ry="8" stroke="#D1D5DB" stroke-width="1"/>

  <!-- Title (top-left) -->
  <text x="85" y="36" font-family="'Plus Jakarta Sans', sans-serif" font-size="18" font-weight="600" fill="#1B3A5C">Bowl Speed vs. Solids Recovery</text>

  <!-- Subtitle (below title, lighter) -->
  <text x="85" y="52" font-family="'Source Sans 3', sans-serif" font-size="11" fill="#6B7280">Effect of bowl speed on separation efficiency by solids type</text>

  <!-- Copyright (upper-right) -->
  <text x="755" y="26" font-family="'Source Sans 3', sans-serif" font-size="10" fill="#6B7280" text-anchor="end">© dolphincentrifuge.com</text>

  <!-- Watermark -->
  <text x="415" y="260" font-family="'Plus Jakarta Sans', sans-serif" font-size="44" font-weight="700" fill="#1B3A5C" opacity="0.055" text-anchor="middle" dominant-baseline="middle">DOLPHIN CENTRIFUGE</text>

  <!-- Plot area -->
  <g transform="translate(85, 65)">
    <!-- Subtle grid (horizontal only) -->
    <line x1="0" y1="0" x2="670" y2="0" stroke="#E5E7EB" stroke-width="0.4"/>
    <line x1="0" y1="85" x2="670" y2="85" stroke="#E5E7EB" stroke-width="0.4"/>
    <line x1="0" y1="170" x2="670" y2="170" stroke="#E5E7EB" stroke-width="0.4"/>
    <line x1="0" y1="255" x2="670" y2="255" stroke="#E5E7EB" stroke-width="0.4"/>

    <!-- Y-axis -->
    <line x1="0" y1="0" x2="0" y2="340" stroke="#374151" stroke-width="1"/>
    <!-- X-axis -->
    <line x1="0" y1="340" x2="670" y2="340" stroke="#374151" stroke-width="1"/>

    <!-- Optimum Speed Range - light fill between verticals -->
    <rect x="225" y="0" width="190" height="340" fill="#1B3A5C" opacity="0.035" rx="2"/>
    <line x1="225" y1="0" x2="225" y2="340" stroke="#9CA3AF" stroke-width="0.8" stroke-dasharray="5,3"/>
    <line x1="415" y1="0" x2="415" y2="340" stroke="#9CA3AF" stroke-width="0.8" stroke-dasharray="5,3"/>

    <!-- Optimum range label (inside the shaded area, top) -->
    <text x="320" y="18" font-family="'Source Sans 3', sans-serif" font-size="11" fill="#4B5563" text-anchor="middle" font-style="italic">Optimum Speed Range</text>

    <!-- Soft / Coarse markers at bottom of verticals -->
    <text x="225" y="358" font-family="'Source Sans 3', sans-serif" font-size="11" fill="#374151" text-anchor="middle">Soft</text>
    <text x="415" y="358" font-family="'Source Sans 3', sans-serif" font-size="11" fill="#374151" text-anchor="middle">Coarse</text>

    <!-- Curve 1: Theoretical (Navy - straight line) -->
    <line x1="30" y1="300" x2="630" y2="5" stroke="#1B3A5C" stroke-width="2" stroke-linecap="round"/>
    <circle cx="225" cy="185" r="2.5" fill="#1B3A5C"/>
    <circle cx="415" cy="73" r="2.5" fill="#1B3A5C"/>
    <!-- Arrow pointer to label -->
    <line x1="632" y1="5" x2="645" y2="5" stroke="#1B3A5C" stroke-width="1"/>
    <text x="650" y="9" font-family="'Source Sans 3', sans-serif" font-size="12" fill="#1B3A5C" font-weight="600">Theoretical</text>

    <!-- Curve 2: Coarse Solids (Gold - smooth peak) -->
    <path d="M 30,285 Q 130,210 225,145 Q 310,100 390,90 Q 450,88 500,108 Q 560,135 630,160"
          fill="none" stroke="#E8A317" stroke-width="2" stroke-linecap="round"/>
    <circle cx="225" cy="145" r="2.5" fill="#E8A317"/>
    <circle cx="390" cy="90" r="2.5" fill="#E8A317"/>
    <circle cx="560" cy="135" r="2.5" fill="#E8A317"/>
    <line x1="632" y1="160" x2="645" y2="160" stroke="#E8A317" stroke-width="1"/>
    <text x="650" y="164" font-family="'Source Sans 3', sans-serif" font-size="12" fill="#E8A317" font-weight="600">Coarse Solids</text>

    <!-- Curve 3: Soft Solids (Gray dashed - peaks early, drops) -->
    <path d="M 30,298 Q 110,260 200,215 Q 260,195 300,200 Q 370,218 440,250 Q 530,290 630,315"
          fill="none" stroke="#6B7280" stroke-width="2" stroke-linecap="round" stroke-dasharray="8,4"/>
    <circle cx="200" cy="215" r="2.5" fill="#6B7280"/>
    <circle cx="300" cy="200" r="2.5" fill="#6B7280"/>
    <circle cx="530" cy="290" r="2.5" fill="#6B7280"/>
    <line x1="632" y1="315" x2="645" y2="315" stroke="#6B7280" stroke-width="1"/>
    <text x="650" y="319" font-family="'Source Sans 3', sans-serif" font-size="12" fill="#6B7280" font-weight="600">Soft Solids</text>
  </g>

  <!-- Y-axis label -->
  <text x="25" y="260" font-family="'Source Sans 3', sans-serif" font-size="13" fill="#1B3A5C" transform="rotate(-90, 25, 260)" text-anchor="middle">Solids Recovery - %</text>

  <!-- X-axis -->
  <text x="125" y="435" font-family="'Source Sans 3', sans-serif" font-size="12" fill="#6B7280">&lt;&lt;&lt; Low</text>
  <text x="415" y="440" font-family="'Source Sans 3', sans-serif" font-size="14" fill="#1B3A5C" text-anchor="middle" font-weight="600">BOWL SPEED</text>
  <text x="710" y="435" font-family="'Source Sans 3', sans-serif" font-size="12" fill="#6B7280" text-anchor="end">High &gt;&gt;&gt;</text>
</svg>