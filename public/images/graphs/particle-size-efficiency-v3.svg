<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 520" role="img" aria-label="Particle Size vs Separation Efficiency comparison between Decanter and Disc Stack Centrifuges">
  <desc>Chart comparing separation efficiency of decanter centrifuges (coarse particles, 10-5000 micron) versus disc stack centrifuges (fine particles, 0.5-500 micron). Shows overlapping range where either type works, with disc stack excelling at fine separation and decanter at coarse/high-solids applications.</desc>

  <!-- Background -->
  <rect width="780" height="520" rx="12" fill="#FAFAF7"/>
  <rect x="80" y="60" width="620" height="380" fill="white" stroke="#e5e7eb" stroke-width="0.5" rx="4"/>

  <!-- Title -->
  <text x="390" y="35" font-family="'Plus Jakarta Sans', sans-serif" font-size="17" font-weight="600" fill="#1B3A5C" text-anchor="middle">Particle Size vs. Separation Efficiency</text>
  <text x="390" y="52" font-family="'Source Sans 3', sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">Decanter Centrifuge vs. Disc Stack Centrifuge</text>
  <text x="700" y="25" font-family="'Source Sans 3', sans-serif" font-size="10" fill="#6B7280" text-anchor="end">© dolphincentrifuge.com</text>

  <!-- Watermark -->
  <text x="390" y="260" font-family="'Plus Jakarta Sans', sans-serif" font-size="42" font-weight="700" fill="#1B3A5C" opacity="0.05" text-anchor="middle" dominant-baseline="middle">DOLPHIN CENTRIFUGE</text>

  <!-- Grid lines -->
  <g stroke="#f0f0f0" stroke-width="0.5">
    <line x1="80" y1="140" x2="700" y2="140"/>
    <line x1="80" y1="220" x2="700" y2="220"/>
    <line x1="80" y1="300" x2="700" y2="300"/>
    <line x1="80" y1="380" x2="700" y2="380"/>
    <line x1="200" y1="60" x2="200" y2="440"/>
    <line x1="320" y1="60" x2="320" y2="440"/>
    <line x1="440" y1="60" x2="440" y2="440"/>
    <line x1="560" y1="60" x2="560" y2="440"/>
  </g>

  <!-- Overlap zone -->
  <rect x="280" y="60" width="200" height="380" fill="#E8A317" opacity="0.06" rx="2"/>
  <text x="380" y="455" font-family="'Source Sans 3', sans-serif" font-size="10" fill="#E8A317" text-anchor="middle" font-style="italic">Overlap Zone</text>

  <!-- Disc Stack curve (fine particles - left side) -->
  <path d="M100,400 C140,395 180,350 240,200 C280,120 320,85 380,80 C440,78 500,120 540,220 C570,300 600,370 650,400" 
        fill="none" stroke="#1B3A5C" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Decanter curve (coarse particles - right side) -->
  <path d="M180,420 C220,415 260,380 320,300 C360,230 400,140 440,90 C480,75 540,72 580,75 C620,80 660,100 690,140" 
        fill="none" stroke="#E8A317" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="8,4"/>

  <!-- Disc Stack fill area (subtle) -->
  <path d="M100,400 C140,395 180,350 240,200 C280,120 320,85 380,80 C440,78 500,120 540,220 C570,300 600,370 650,400 L650,440 L100,440 Z" 
        fill="#1B3A5C" opacity="0.04"/>

  <!-- Decanter fill area (subtle) -->
  <path d="M180,420 C220,415 260,380 320,300 C360,230 400,140 440,90 C480,75 540,72 580,75 C620,80 660,100 690,140 L690,440 L180,440 Z" 
        fill="#E8A317" opacity="0.04"/>

  <!-- X-axis labels (particle size) -->
  <text x="390" y="490" text-anchor="middle" font-size="12" fill="#1B3A5C" font-family="'Plus Jakarta Sans', sans-serif" font-weight="600">Particle Size (microns)</text>
  <text x="120" y="468" font-size="10" fill="#6B7280" font-family="'Source Sans 3', sans-serif" text-anchor="middle">0.5</text>
  <text x="200" y="468" font-size="10" fill="#6B7280" font-family="'Source Sans 3', sans-serif" text-anchor="middle">1</text>
  <text x="280" y="468" font-size="10" fill="#6B7280" font-family="'Source Sans 3', sans-serif" text-anchor="middle">10</text>
  <text x="390" y="468" font-size="10" fill="#6B7280" font-family="'Source Sans 3', sans-serif" text-anchor="middle">100</text>
  <text x="500" y="468" font-size="10" fill="#6B7280" font-family="'Source Sans 3', sans-serif" text-anchor="middle">500</text>
  <text x="600" y="468" font-size="10" fill="#6B7280" font-family="'Source Sans 3', sans-serif" text-anchor="middle">1000</text>
  <text x="680" y="468" font-size="10" fill="#6B7280" font-family="'Source Sans 3', sans-serif" text-anchor="middle">5000</text>

  <!-- Y-axis label -->
  <text x="22" y="250" font-family="'Plus Jakarta Sans', sans-serif" font-size="12" fill="#1B3A5C" font-weight="600" text-anchor="middle" transform="rotate(-90, 22, 250)">Separation Efficiency (%)</text>
  <text x="65" y="443" font-size="10" fill="#6B7280" font-family="'Source Sans 3', sans-serif" text-anchor="end">0</text>
  <text x="65" y="383" font-size="10" fill="#6B7280" font-family="'Source Sans 3', sans-serif" text-anchor="end">25</text>
  <text x="65" y="303" font-size="10" fill="#6B7280" font-family="'Source Sans 3', sans-serif" text-anchor="end">50</text>
  <text x="65" y="223" font-size="10" fill="#6B7280" font-family="'Source Sans 3', sans-serif" text-anchor="end">75</text>
  <text x="65" y="143" font-size="10" fill="#6B7280" font-family="'Source Sans 3', sans-serif" text-anchor="end">90</text>
  <text x="65" y="83" font-size="10" fill="#6B7280" font-family="'Source Sans 3', sans-serif" text-anchor="end">99</text>

  <!-- Legend -->
  <rect x="520" y="490" width="20" height="3" fill="#1B3A5C" rx="1"/>
  <text x="545" y="494" font-family="'Source Sans 3', sans-serif" font-size="11" fill="#1B3A5C" font-weight="600">Disc Stack</text>
  <line x1="620" y1="489" x2="640" y2="489" stroke="#E8A317" stroke-width="2.5" stroke-dasharray="6,3"/>
  <text x="645" y="494" font-family="'Source Sans 3', sans-serif" font-size="11" fill="#E8A317" font-weight="600">Decanter</text>

  <!-- Curve labels -->
  <text x="200" y="170" font-family="'Source Sans 3', sans-serif" font-size="12" fill="#1B3A5C" font-weight="700">Disc Stack</text>
  <text x="200" y="184" font-family="'Source Sans 3', sans-serif" font-size="10" fill="#6B7280">Fine particles</text>
  <text x="540" y="105" font-family="'Source Sans 3', sans-serif" font-size="12" fill="#E8A317" font-weight="700">Decanter</text>
  <text x="540" y="119" font-family="'Source Sans 3', sans-serif" font-size="10" fill="#6B7280">Coarse particles</text>

</svg>
