<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 420" role="img" aria-label="Decanter Centrifuge Pond Depth versus Cake Dryness and Torque Performance">
  <desc>Graph showing how decanter centrifuge pond depth affects performance: as pond depth increases (shallow to deep), centrate clarity improves, cake dryness decreases, and scroll torque increases. Shows the trade-off operators must balance.</desc>

  <!-- Background -->
  <rect width="780" height="420" rx="12" fill="#FAFAF7"/>
  <rect x="80" y="50" width="620" height="300" fill="white" stroke="#e5e7eb" stroke-width="0.5" rx="4"/>

  <!-- Title -->
  <text x="390" y="30" font-family="'Plus Jakarta Sans', sans-serif" font-size="17" font-weight="600" fill="#1B3A5C" text-anchor="middle">Pond Depth vs. Decanter Performance</text>
  <text x="390" y="45" font-family="'Source Sans 3', sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">Effect of pond depth on centrate clarity, cake dryness, and scroll torque</text>
  <text x="700" y="20" font-family="'Source Sans 3', sans-serif" font-size="10" fill="#6B7280" text-anchor="end">© dolphincentrifuge.com</text>

  <!-- Watermark -->
  <text x="390" y="210" font-family="'Plus Jakarta Sans', sans-serif" font-size="42" font-weight="700" fill="#1B3A5C" opacity="0.05" text-anchor="middle" dominant-baseline="middle">DOLPHIN CENTRIFUGE</text>

  <!-- Grid lines -->
  <g stroke="#f0f0f0" stroke-width="0.5">
    <line x1="80" y1="112" x2="700" y2="112"/>
    <line x1="80" y1="175" x2="700" y2="175"/>
    <line x1="80" y1="237" x2="700" y2="237"/>
    <line x1="80" y1="300" x2="700" y2="300"/>
    <line x1="235" y1="50" x2="235" y2="350"/>
    <line x1="390" y1="50" x2="390" y2="350"/>
    <line x1="545" y1="50" x2="545" y2="350"/>
  </g>

  <!-- Centrate Clarity curve (rises with deeper pond) -->
  <path d="M100,310 C180,290 280,230 390,150 C460,110 550,80 680,65" 
        fill="none" stroke="#E8A317" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Cake Dryness curve (falls with deeper pond) -->
  <path d="M100,80 C180,95 280,150 390,220 C460,260 550,290 680,320" 
        fill="none" stroke="#1B3A5C" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Scroll Torque curve (rises with deeper pond, moderate) -->
  <path d="M100,290 C180,275 280,245 390,200 C460,170 550,145 680,120" 
        fill="none" stroke="#6B7280" stroke-width="2" stroke-linecap="round" stroke-dasharray="8,4"/>

  <!-- X-axis -->
  <text x="390" y="385" text-anchor="middle" font-size="12" fill="#1B3A5C" font-family="'Plus Jakarta Sans', sans-serif" font-weight="600">Pond Depth</text>
  <text x="120" y="368" font-size="10" fill="#6B7280" font-family="'Source Sans 3', sans-serif" text-anchor="middle">Shallow</text>
  <text x="390" y="368" font-size="10" fill="#6B7280" font-family="'Source Sans 3', sans-serif" text-anchor="middle">Medium</text>
  <text x="660" y="368" font-size="10" fill="#6B7280" font-family="'Source Sans 3', sans-serif" text-anchor="middle">Deep</text>

  <!-- Y-axis -->
  <text x="22" y="200" font-family="'Plus Jakarta Sans', sans-serif" font-size="12" fill="#1B3A5C" font-weight="600" text-anchor="middle" transform="rotate(-90, 22, 200)">Performance</text>
  <text x="65" y="353" font-size="10" fill="#6B7280" font-family="'Source Sans 3', sans-serif" text-anchor="end">Low</text>
  <text x="65" y="68" font-size="10" fill="#6B7280" font-family="'Source Sans 3', sans-serif" text-anchor="end">High</text>

  <!-- Curve labels -->
  <text x="600" y="58" font-family="'Source Sans 3', sans-serif" font-size="12" fill="#E8A317" font-weight="700">Centrate Clarity</text>
  <text x="600" y="335" font-family="'Source Sans 3', sans-serif" font-size="12" fill="#1B3A5C" font-weight="700">Cake Dryness</text>
  <text x="600" y="112" font-family="'Source Sans 3', sans-serif" font-size="12" fill="#6B7280" font-weight="600">Scroll Torque</text>

  <!-- Legend -->
  <rect x="160" y="398" width="20" height="3" fill="#E8A317" rx="1"/>
  <text x="185" y="402" font-family="'Source Sans 3', sans-serif" font-size="10" fill="#E8A317" font-weight="600">Centrate Clarity</text>
  <rect x="320" y="398" width="20" height="3" fill="#1B3A5C" rx="1"/>
  <text x="345" y="402" font-family="'Source Sans 3', sans-serif" font-size="10" fill="#1B3A5C" font-weight="600">Cake Dryness</text>
  <line x1="480" y1="397" x2="500" y2="397" stroke="#6B7280" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="505" y="402" font-family="'Source Sans 3', sans-serif" font-size="10" fill="#6B7280" font-weight="600">Scroll Torque</text>

</svg>
